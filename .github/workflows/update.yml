name: Manual Lotto DB Update

# 토요일 밤에 내가 원할 때 직접 버튼을 눌러 실행하겠다는 규칙입니다.
on:
  workflow_dispatch:
    inputs:
      draw_date:
        description: '추첨 날짜 (예: 2026-05-23)'
        required: true
        default: '2026-05-23'
      num1:
        description: '번호 1'
        required: true
      num2:
        description: '번호 2'
        required: true
      num3:
        description: '번호 3'
        required: true
      num4:
        description: '번호 4'
        required: true
      num5:
        description: '번호 5'
        required: true
      num6:
        description: '번호 6'
        required: true
      bonus:
        description: '보너스 번호'
        required: true

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 라이브러리 설치
      run: |
        pip install requests

          # 맨 아랫줄 run 부분을 이렇게 교체합니다. 
    - name: 수동 입력값 파이썬에 던져주며 실행
      run: |
        python update_lotto.py "${{ github.event.inputs.draw_date }}" ${{ github.event.inputs.num1 }} ${{ github.event.inputs.num2 }} ${{ github.event.inputs.num3 }} ${{ github.event.inputs.num4 }} ${{ github.event.inputs.num5 }} ${{ github.event.inputs.num6 }} ${{ github.event.inputs.bonus }}

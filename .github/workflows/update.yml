name: lotto-update
on:
  schedule:
    - cron: '35 11 * * 6'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: run
        run: python3 update_lotto.py
      - name: push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git pull --rebase origin main
          git add lotto.json
          git diff --staged --quiet || (git commit -m "update" && git push)

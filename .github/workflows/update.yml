name: 로또 데이터 자동 업데이트

on:
  schedule:
    - cron: '35 11 * * 6'
  workflow_dispatch:

jobs:
  update-lotto-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: requests 설치
        run: pip install requests

      - name: 로또 데이터 업데이트
        run: |
          python3 << 'PYEOF'
          import requests, json, time
          from datetime import date

          with open('lotto.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          draws = data['draws']
          existing_nos = set(d['drwNo'] for d in draws)
          max_saved = max(existing_nos) if existing_nos else 0

          start = date(2002, 12, 7)
          today = date.today()
          est_latest = (today - start).days // 7 + 1

          print(f"저장된 최신: {max_saved}회차, 예상 최신: {est_latest}회차")

          added = 0
          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
              'Referer': 'https://www.dhlottery.co.kr/',
              'Accept': 'application/json'
          }

          for no in range(max_saved + 1, est_latest + 2):
              try:
                  url = f"https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo={no}"
                  resp = requests.get(url, headers=HEADERS, timeout=10)
                  d = resp.json()
                  if d.get('returnValue') == 'success':
                      existing = next((x for x in draws if x['drwNo'] == d['drwNo']), None)
                      draw_data = {
                          "drwNo": d['drwNo'], "drwNoDate": d['drwNoDate'],
                          "drwtNo1": d['drwtNo1'], "drwtNo2": d['drwtNo2'],
                          "drwtNo3": d['drwtNo3'], "drwtNo4": d['drwtNo4'],
                          "drwtNo5": d['drwtNo5'], "drwtNo6": d['drwtNo6'],
                          "bnusNo": d['bnusNo'],
                          "firstPrzwnerCo": d.get('firstPrzwnerCo', 0),
                          "firstWinamnt": d.get('firstWinamnt', 0)
                      }
                      if existing:
                          draws[draws.index(existing)] = draw_data
                          print(f"업데이트: {no}회차")
                      else:
                          draws.append(draw_data)
                          added += 1
                          print(f"추가: {no}회차")
                  else:
                      print(f"추첨 전: {no}회차")
                      break
                  time.sleep(0.5)
              except Exception as e:
                  print(f"오류 {no}회차: {e}")
                  time.sleep(2)

          draws.sort(key=lambda x: x['drwNo'])
          with open('lotto.json', 'w', encoding='utf-8') as f:
              json.dump({"lastUpdated": today.isoformat(), "totalDraws": len(draws), "draws": draws}, f, ensure_ascii=True, separators=(',', ':'))
          print(f"완료! {added}개 추가, 총 {len(draws)}회차")
          PYEOF

      - name: 커밋 & 푸시
        run: |
          git config user.name "Lotto Bot"
          git config user.email "bot@lotto-wizard.com"
          git add lotto.json
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "로또 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
          fi

name: lotto-update
on:
  schedule:
    - cron: '35 11 * * 6'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: run
        run: python3 update_lotto.py
      - name: push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/sungwoolee0705-creator/lotto-wizard.git
          git add lotto.json
          
          # 변경 사항이 있는지 확인 후 처리
          if ! git diff --staged --quiet; then
            git commit -m "update"
            git pull --rebase origin main  # ◀ [핵심] 원격의 최신 커밋을 가져와 내 커밋 앞에 정렬합니다.
            git push origin main
          fi

name: lotto-update
on:
  schedule:
    - cron: '35 11 * * 6'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: run
        run: python3 update_lotto.py
        
      - name: push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/sungwoolee0705-creator/lotto-wizard.git
          git add lotto.json
          if ! git diff --staged --quiet; then
            git commit -m "update"
            git pull --rebase origin main
            git push origin main
          fi

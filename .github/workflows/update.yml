name: Manual Lotto DB Update

# 토요일 밤에 내가 원할 때 직접 버튼을 눌러 실행하겠다는 규칙입니다.
on:
  workflow_dispatch:
    inputs:
      draw_date:
        description: '추첨 날짜 (예: 2026-05-23)'
        required: true
        default: '2026-05-23'
      num1:
        description: '번호 1'
        required: true
      num2:
        description: '번호 2'
        required: true
      num3:
        description: '번호 3'
        required: true
      num4:
        description: '번호 4'
        required: true
      num5:
        description: '번호 5'
        required: true
      num6:
        description: '번호 6'
        required: true
      bonus:
        description: '보너스 번호'
        required: true

# 깃허브 액션 가상 컴퓨터가 내 저장소(lotto.json)에 파일을 다시 쓸 수 있도록 권한을 부여합니다.
permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 라이브러리 설치
      run: |
        pip install requests

    - name: 수동 입력값 파이썬에 던져주며 실행
      run: |
        python update_lotto.py "${{ github.event.inputs.draw_date }}" ${{ github.event.inputs.num1 }} ${{ github.event.inputs.num2 }} ${{ github.event.inputs.num3 }} ${{ github.event.inputs.num4 }} ${{ github.event.inputs.num5 }} ${{ github.event.inputs.num6 }} ${{ github.event.inputs.bonus }}

    - name: 업데이트된 lotto.json을 내 깃허브 저장소에 반영
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add lotto.json
        # 변경된 사항이 있을 때만 안전하게 깃허브 저장소로 push(저장)합니다.
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 수동 입력 데이터 깃허브 파일 동기화 (회차 추가)" && git push)

name: lotto-update

on:
  schedule:
    - cron: '35 11 * * 6'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: update data
        run: |
          python3 - << 'EOF'
          import requests, json, time
          from datetime import date

          with open('lotto.json', 'r') as f:
              data = json.load(f)

          draws = data['draws']
          nos = set(d['drwNo'] for d in draws)
          max_no = max(nos) if nos else 0
          today = date.today()
          est = (today - date(2002, 12, 7)).days // 7 + 1
          added = 0
          headers = {'User-Agent': 'Mozilla/5.0', 'Referer': 'https://www.dhlottery.co.kr/'}

          for no in range(max_no + 1, est + 2):
              try:
                  r = requests.get(f'https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo={no}', headers=headers, timeout=10)
                  d = r.json()
                  if d.get('returnValue') == 'success':
                      draws.append({'drwNo':d['drwNo'],'drwNoDate':d['drwNoDate'],'drwtNo1':d['drwtNo1'],'drwtNo2':d['drwtNo2'],'drwtNo3':d['drwtNo3'],'drwtNo4':d['drwtNo4'],'drwtNo5':d['drwtNo5'],'drwtNo6':d['drwtNo6'],'bnusNo':d['bnusNo'],'firstPrzwnerCo':d.get('firstPrzwnerCo',0),'firstWinamnt':d.get('firstWinamnt',0)})
                      added += 1
                      print(f'added {no}')
                  else:
                      break
                  time.sleep(0.5)
              except Exception as e:
                  print(f'error {no}: {e}')
                  break

          draws.sort(key=lambda x: x['drwNo'])
          with open('lotto.json', 'w') as f:
              json.dump({'lastUpdated': today.isoformat(), 'totalDraws': len(draws), 'draws': draws}, f, ensure_ascii=True, separators=(',', ':'))
          print(f'done: added {added}, total {len(draws)}')
          EOF

      - name: commit
        run: |
          git config user.name "Lotto Bot"
          git config user.email "bot@lotto.com"
          git add lotto.json
          git diff --staged --quiet || git commit -m "update $(date +'%Y-%m-%d')" && git push
